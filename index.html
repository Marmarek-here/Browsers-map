<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browsers Genealogy Map</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            background: #0f172a; 
            color: #f8fafc; 
            overflow: hidden;
        }
        #cy { 
            flex-grow: 1; 
            height: 100%; 
        }
        #sidebar { 
            width: 380px; 
            background: #1e293b; 
            padding: 30px; 
            box-shadow: -5px 0 20px rgba(0,0,0,0.4); 
            overflow-y: auto; 
            display: none;
            border-left: 1px solid #334155;
            transition: all 0.3s ease;
        }
        
        #sidebar-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #334155;
        }
        #sidebar-icon {
            width: 40px;
            height: 40px;
            margin-right: 15px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        #title { 
            color: #38bdf8; 
            margin: 0; 
            font-size: 1.5em;
        }

        #sidebar a { color: #38bdf8; text-decoration: none; font-weight: bold; }
        #sidebar a:hover { text-decoration: underline; }
        
        .btn-add { 
            position: absolute; 
            bottom: 20px; 
            left: 20px; 
            padding: 12px 24px; 
            background: #38bdf8; 
            color: #0f172a; 
            border: none; 
            cursor: pointer; 
            border-radius: 8px; 
            font-weight: bold;
            transition: background 0.3s;
            z-index: 10;
        }
        .btn-add:hover { background: #7dd3fc; }
        
        #placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #475569;
            pointer-events: none;
            font-size: 1.2em;
        }
    </style>
</head>
<body>

    <div id="placeholder">Click on a browser to see details</div>
    <div id="cy"></div>
    
    <div id="sidebar">
        <div id="sidebar-header">
            <div id="sidebar-icon"></div>
            <h2 id="title">Browser Name</h2>
        </div>
        <div id="content">Loading information...</div>
    </div>

    <button class="btn-add" onclick="window.open('https://github.com/Marmarek-here/Browsers-Map/issues')">
        Suggest a Browser
    </button>

    <script>
        // Функция для генерации ссылки на иконку
        function getIconUrl(siteUrl) {
            return `https://www.google.com/s2/favicons?sz=128&domain_url=${siteUrl}`;
        }

        async function init() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();

                const cy = cytoscape({
                    container: document.getElementById('cy'),
                    elements: data,
                    style: [
                        {
                            selector: 'node',
                            style: {
                                'label': 'data(label)',
                                'color': '#f8fafc',
                                'text-valign': 'bottom',
                                'text-margin-y': 8,
                                'font-size': '11px',
                                'text-wrap': 'wrap',
                                'text-max-width': '80px',
                                
                                // НАСТРОЙКИ ИКОНОК
                                'width': 50, // Чуть меньше, чтобы фавиконки не мылились
                                'height': 50,
                                // Используем функцию для динамического получения иконки
                                'background-image': function(node) { return getIconUrl(node.data('url')); },
                                'background-fit': 'contain',
                                'background-clip': 'node',
                                'background-opacity': 0,
                                'border-width': 0
                            }
                        },
                        {
                            selector: 'edge',
                            style: {
                                'width': 2,
                                'line-color': '#475569',
                                'target-arrow-color': '#475569',
                                'target-arrow-shape': 'triangle',
                                'curve-style': 'bezier',
                                'opacity': 0.6
                            }
                        },
                        {
                            selector: 'node:selected',
                            style: {
                                'background-color': '#fbbf24',
                                'background-opacity': 0.2,
                                'border-width': 2,
                                'border-color': '#fbbf24'
                            }
                        }
                    ],
                    layout: { 
                        name: 'breadthfirst', 
                        directed: true, 
                        padding: 50,
                        spacingFactor: 1.3
                    }
                });

                cy.on('tap', 'node', async function(evt){
                    const node = evt.target;
                    const wikiPage = node.data('wiki');
                    // Генерируем иконку для сайдбара
                    const iconPath = getIconUrl(node.data('url'));
                    
                    document.getElementById('placeholder').style.display = 'none';
                    document.getElementById('sidebar').style.display = 'block';
                    document.getElementById('title').innerText = node.data('label');
                    
                    document.getElementById('sidebar-icon').style.backgroundImage = `url(${iconPath})`;
                    document.getElementById('content').innerHTML = 'Loading from Wikipedia...';
                    
                    const wikiUrl = `https://en.wikipedia.org/api/rest_v1/page/summary/${wikiPage}`;
                    try {
                        const res = await fetch(wikiUrl);
                        const info = await res.json();
                        document.getElementById('content').innerHTML = `
                            <p>${info.extract || 'No description available.'}</p>
                            <hr style="border: 0; border-top: 1px solid #334155; margin: 20px 0;">
                            <a href="${info.content_urls.desktop.page}" target="_blank">Read more on Wikipedia →</a>
                        `;
                    } catch (e) {
                        document.getElementById('content').innerText = 'Failed to load Wikipedia data.';
                    }
                });
            } catch (error) {
                console.error('Error loading data.json:', error);
                document.getElementById('placeholder').innerText = 'Error loading map data.';
            }
        }

        init();
    </script>
</body>
</html>
